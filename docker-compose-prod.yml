services:
  nauth-api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: nauth-api
    restart: unless-stopped
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ASPNETCORE_URLS: "http://+:80;https://+:443"
      Tenant__DefaultTenantId: emagine
      # Maps to appsettings: Tenants.emagine.ConnectionString
      Tenants__emagine__ConnectionString: ${EMAGINE_CONNECTION_STRING}
      # Maps to appsettings: Tenants.emagine.JwtSecret
      Tenants__emagine__JwtSecret: ${EMAGINE_JWT_SECRET}
      # Maps to appsettings: Tenants.viralt.ConnectionString
      Tenants__viralt__ConnectionString: ${VIRALT_CONNECTION_STRING}
      # Maps to appsettings: Tenants.viralt.JwtSecret
      Tenants__viralt__JwtSecret: ${VIRALT_JWT_SECRET}
      # Maps to appsettings: Tenants.devblog.ConnectionString
      Tenants__devblog__ConnectionString: ${DEVBLOG_CONNECTION_STRING}
      # Maps to appsettings: Tenants.devblog.JwtSecret
      Tenants__devblog__JwtSecret: ${DEVBLOG_JWT_SECRET}
      # Maps to appsettings: Tenants.bazzuca.ConnectionString
      Tenants__bazzuca__ConnectionString: ${BAZZUCA_CONNECTION_STRING}
      # Maps to appsettings: Tenants.bazzuca.JwtSecret
      Tenants__bazzuca__JwtSecret: ${BAZZUCA_JWT_SECRET}
      # Maps to appsettings: Tenants.monexup.ConnectionString
      Tenants__monexup__ConnectionString: ${MONEXUP_CONNECTION_STRING}
      # Maps to appsettings: Tenants.monexup.JwtSecret
      Tenants__monexup__JwtSecret: ${MONEXUP_JWT_SECRET}
      # Maps to appsettings: Tenants.fortuno.ConnectionString
      Tenants__fortuno__ConnectionString: ${FORTUNO_CONNECTION_STRING}
      # Maps to appsettings: Tenants.fortuno.JwtSecret
      Tenants__fortuno__JwtSecret: ${FORTUNO_JWT_SECRET}
      # HTTPS certificate
      ASPNETCORE_Kestrel__Certificates__Default__Password: ${CERTIFICATE_PASSWORD}
      ASPNETCORE_Kestrel__Certificates__Default__Path: /app/emagine.pfx
    expose:
      - "80"
      - "443"
    networks:
      - emagine-network
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:80/ || exit 1"]
      interval: 30s
      timeout: 3s
      start_period: 10s
      retries: 3

networks:
  emagine-network:
    name: emagine-network
    external: true
